<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>BAND 채팅 백업기</title>

<link rel="stylesheet"
href="css/style.css">
</head>

<body>

<header class="topbar">

    <h1>BAND 채팅 백업기</h1>

    <div class="toolbar">

        <input
            type="file"
            id="txtFile"
            accept=".txt">

        <input
            type="text"
            id="searchInput"
            placeholder="채팅 검색">

        <button id="downloadBtn">
            HTML 저장
        </button>

    </div>

</header>

<div class="layout">

    <aside class="sidebar">

        <h2>캐릭터</h2>

        <div id="characterList"></div>

    </aside>

    <main id="chatContainer">

        <div class="empty">

            TXT 파일을 업로드하세요.

        </div>

    </main>

</div>

<script src="js/app.js"></script>

</body>
</html>
